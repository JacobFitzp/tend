name: Build & Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        shell: bash
      - run: npx cross-env ELECTRON_BUILD=1 next build
      - run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Set version from tag
        run: |
          $tag = "${{ github.event.release.tag_name }}" -replace '^v', ''
          npm version $tag --no-git-tag-version
        shell: pwsh
      - run: npx cross-env ELECTRON_BUILD=1 next build
      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        shell: bash
      - name: Build Next.js static output
        run: npx next build
      - name: Sync Android platform
        run: npx cap sync android
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Upload APK to release
        run: gh release upload "$GITHUB_REF_NAME" android/app/build/outputs/apk/debug/app-debug.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
        shell: bash
      - run: npx cross-env ELECTRON_BUILD=1 next build
      - run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
