<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#3A6B34"/>
  <!-- Pot rim -->
  <rect x="11" y="25.5" width="10" height="2.5" rx="1.2" fill="#C0895A"/>
  <!-- Stem -->
  <line x1="16" y1="26" x2="16" y2="14" stroke="#7DC462" stroke-width="2" stroke-linecap="round"/>
  <!-- Left leaf -->
  <ellipse cx="12" cy="20" rx="4.5" ry="2" fill="#5FA84A" transform="rotate(-35 12 20)"/>
  <!-- Right leaf -->
  <ellipse cx="20" cy="17" rx="4.5" ry="2" fill="#5FA84A" transform="rotate(35 20 17)"/>
  <!-- Flower petals -->
  <circle cx="16" cy="10.5" r="1.6" fill="#CE93D8"/>
  <circle cx="19.4" cy="12.2" r="1.6" fill="#CE93D8"/>
  <circle cx="19.4" cy="8.8" r="1.6" fill="#CE93D8"/>
  <circle cx="12.6" cy="12.2" r="1.6" fill="#CE93D8"/>
  <circle cx="12.6" cy="8.8" r="1.6" fill="#CE93D8"/>
  <!-- Centre -->
  <circle cx="16" cy="10.5" r="2.5" fill="#B39DDB"/>
  <circle cx="16" cy="10.5" r="1.2" fill="#7B1FA2"/>
</svg>
